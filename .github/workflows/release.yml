name: Bump Version & Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      package:
        description: "Package to release"
        required: true
        type: choice
        options:
          - obstacle-router
          - reactflow-edge-routing
          - svelteflow-edge-routing
          - all

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Bump version (obstacle-router)
        if: ${{ inputs.package == 'obstacle-router' || inputs.package == 'all' }}
        working-directory: packages/obstacle-router
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Bump version (reactflow-edge-routing)
        if: ${{ inputs.package == 'reactflow-edge-routing' || inputs.package == 'all' }}
        working-directory: packages/reactflow-edge-routing
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Bump version (svelteflow-edge-routing)
        if: ${{ inputs.package == 'svelteflow-edge-routing' || inputs.package == 'all' }}
        working-directory: packages/svelteflow-edge-routing
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          PACKAGE="${{ inputs.package }}"
          BUMP="${{ inputs.bump }}"
          if [ "$PACKAGE" = "all" ]; then
            VERSIONS=""
            VERSIONS="$VERSIONS obstacle-router@$(node -p "require('./packages/obstacle-router/package.json').version")"
            VERSIONS="$VERSIONS reactflow-edge-routing@$(node -p "require('./packages/reactflow-edge-routing/package.json').version")"
            VERSIONS="$VERSIONS svelteflow-edge-routing@$(node -p "require('./packages/svelteflow-edge-routing/package.json').version")"
            git commit -m "chore: ${BUMP} version bump for all packages (${VERSIONS})"
          else
            VERSION=$(node -p "require('./packages/${PACKAGE}/package.json').version")
            git commit -m "chore: ${BUMP} version bump ${PACKAGE}@${VERSION}"
          fi
          git push

      - name: Create git tag(s)
        run: |
          PACKAGE="${{ inputs.package }}"
          if [ "$PACKAGE" = "obstacle-router" ] || [ "$PACKAGE" = "all" ]; then
            VERSION=$(node -p "require('./packages/obstacle-router/package.json').version")
            git tag "obstacle-router@${VERSION}"
          fi
          if [ "$PACKAGE" = "reactflow-edge-routing" ] || [ "$PACKAGE" = "all" ]; then
            VERSION=$(node -p "require('./packages/reactflow-edge-routing/package.json').version")
            git tag "reactflow-edge-routing@${VERSION}"
          fi
          if [ "$PACKAGE" = "svelteflow-edge-routing" ] || [ "$PACKAGE" = "all" ]; then
            VERSION=$(node -p "require('./packages/svelteflow-edge-routing/package.json').version")
            git tag "svelteflow-edge-routing@${VERSION}"
          fi
          git push --tags

      - name: Publish obstacle-router
        if: ${{ inputs.package == 'obstacle-router' || inputs.package == 'all' }}
        working-directory: packages/obstacle-router
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish reactflow-edge-routing
        if: ${{ inputs.package == 'reactflow-edge-routing' || inputs.package == 'all' }}
        working-directory: packages/reactflow-edge-routing
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish svelteflow-edge-routing
        if: ${{ inputs.package == 'svelteflow-edge-routing' || inputs.package == 'all' }}
        working-directory: packages/svelteflow-edge-routing
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
